<!doctype html>
<html
  th:lang="|${#locale.language}-${#locale.country}|"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">
      Job Tracker
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <vite:client></vite:client>
    <vite:vite>
      <vite:entry value="/css/application.css"></vite:entry>
    </vite:vite>
  </head>
  <body class="bg-white font-geist text-black">
    <a
      href="#main-content"
      class="sr-only focus-visible:not-sr-only focus-visible:absolute focus-visible:top-4 focus-visible:left-4 focus-visible:z-[100] focus-visible:border-2 focus-visible:border-black focus-visible:bg-white focus-visible:px-4 focus-visible:py-2 focus-visible:font-bold focus-visible:text-black focus-visible:shadow-brutal-sm"
    >
      Skip to main content
    </a>

    <header layout:fragment="page-header"></header>

    <main id="main-content" layout:fragment="content"></main>

    <footer layout:fragment="page-footer"></footer>

    <th:block layout:fragment="script-content"> </th:block>
  </body>
</html>

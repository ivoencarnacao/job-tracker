name: Continuous Integration

on:
  push:
    branches: 
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    paths-ignore:
      - "**.md"
  pull_request:
    branches: 
      - main
      - develop
    paths-ignore:
      - "**.md"

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  JAVA_DISTRO: "temurin"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: "maven"

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Verify with Maven (Includes Formatting Check)
        run: ./mvnw -B verify